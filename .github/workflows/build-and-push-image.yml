name: Build and Push Container Image

on:
  push:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

jobs:
  build-and-push:
    if: github.event_name != 'delete'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build base image
        run: |
          set -e
          cd hako
          export DOCKER_BUILD_ARGS="--load"
          bash docker/create-image.bash base

      - name: Push base image to GHCR
        run: |
          set -e
          cd hako
          bash docker/push-image.bash base

      - name: Build asset image
        run: |
          set -e
          cd hako
          export DOCKER_BUILD_ARGS="--load"
          bash docker/create-image.bash asset

      - name: Push asset image to GHCR
        if: github.ref == 'refs/heads/main'
        run: |
          set -e
          cd hako
          bash docker/push-image.bash asset
